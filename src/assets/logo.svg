<svg width="120" height="36" viewBox="0 0 120 36" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Motion speed lines behind the R -->
  <line x1="0" y1="10" x2="10" y2="10" stroke="#CDFF00" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="0" y1="18" x2="6" y2="18" stroke="#CDFF00" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
  <line x1="0" y1="26" x2="8" y2="26" stroke="#CDFF00" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- R letter - bold italic -->
  <text x="13" y="29" font-family="'Arial Black', 'Arial', sans-serif" font-size="30" font-weight="900"
        font-style="italic" fill="#CDFF00" letter-spacing="-1">R</text>

  <!-- OLLON text -->
  <text x="38" y="28" font-family="'Arial Black', 'Arial', sans-serif" font-size="22" font-weight="900"
        font-style="italic" fill="#FFFFFF" letter-spacing="-0.5">OLLON</text>

  <!-- Neon dot accent -->
  <circle cx="115" cy="8" r="3" fill="#CDFF00" opacity="0.9"/>
  <circle cx="115" cy="8" r="5" fill="#CDFF00" opacity="0.2"/>
