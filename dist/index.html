};

  var d=document.getElementById('pdr');

};

window.pdrBack=function(){
  if(pdrStack.length>0){var prev=pdrStack.pop();pdrSetPage(prev,true);}
};

window.pdrGo=function(page){
  pdrStack.push(pdrCurrentPage||'main');
  pdrSetPage(page);
};

  pages.forEach(function(p){
    var el=document.getElementById('pdr-'+p);
    if(el)el.style.display=(p===page)?'block':'none';

  var b=document.getElementById('pdr-back');
  if(t)t.textContent=titles[page]||page;
  if(b)b.style.display=(page==='main')?'none':'flex';
}

      showToast('\u041f\u0430\u0440\u043e\u043b\u044c \u0437\u043c\u0456\u043d\u0435\u043d\u043e!');
    } else if(np&&cf&&np.value!==cf.value){
      showToast('\u041f\u0430\u0440\u043e\u043b\u0456 \u043d\u0435 \u0441\u043f\u0456\u0432\u043f\u0430\u0434\u0430\u044e\u0442\u044c','#ef4444');
      return;
    }
  }
  pdrBack();
};

function showToast(msg,color){
  var t=document.getElementById('pdr-toast');
  if(!t){t=document.createElement('div');t.id='pdr-toast';t.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:'+(color||'#00d4aa')+';color:#0f212e;padding:10px 20px;border-radius:25px;font-weight:700;font-size:13px;z-index:9999;transition:opacity .3s';document.body.appendChild(t);}
  t.style.background=color||'#00d4aa';t.style.color=color?'#fff':'#0f212e';
  t.textContent=msg;t.style.opacity='1';
  setTimeout(function(){t.style.opacity='0';},2000);
}

window.pdrOpen=function(){
  buildDrawer();
  document.getElementById('pdr').style.display='block';
  pdrStack=[];
  pdrSetPage('main');
  document.getElementById('pdr-panel').scrollTop=0;
};
window.pdrClose=function(){document.getElementById('pdr').style.display='none';};
window.pdrBack=function(){if(pdrStack.length)pdrSetPage(pdrStack.pop(),true);};

window.betsTab=function(tab){

window.pdrGo=function(p){if(p&&p[0]==='/'){pdrClose();setTimeout(function(){window.history.pushState(null,'',p);window.dispatchEvent(new PopStateEvent('popstate',{state:null}));},80);return;}pdrStack.push(pdrCur);pdrSetPage(p);document.getElementById('pdr-panel').scrollTop=0;};
window.pdrTab=function(btn,tab){

function pdrSetPage(p,back){
  pdrCur=p;
  pdrPages.forEach(function(n){var e=document.getElementById('pdr-'+n);if(e)e.style.display=n===p?'block':'none';});
  var ti=document.getElementById('pdr-title');if(ti)ti.textContent=pdrTitles[p]||p;
  var bk=document.getElementById('pdr-back');if(bk)bk.style.display=p==='main'?'none':'flex';
}

/* Capture listener — перехоплює кліки на нашому блоці ДО React */
var captureAdded=false;
function addCapture(){
  if(captureAdded)return;
  captureAdded=true;
  document.addEventListener('click',function(ev){
    var ub=document.querySelector('[data-ub="1"]');
    if(!ub)return;
    /* Перехоплюємо кліки по ub І по батьківському елементу (фон сайдбару) */
    var ubp=ub.parentElement;
    var inUb=ub.contains(ev.target);
    var inUbp=ubp&&ubp.contains(ev.target);
    var inSub=!!ev.target.closest('[data-ubsub="1"]');
    if(!inUb&&!inUbp&&!inSub)return;
    ev.stopImmediatePropagation();
    ev.preventDefault();
    if(ev.target.closest('#uid-el')||ev.target.closest('#uid-txt')){
      navigator.clipboard.writeText(userId);
      var t=document.getElementById('uid-txt');
      if(t){t.textContent='\u2705 \u0421\u043a\u043e\u043f\u0456\u0439\u043e\u0432\u0430\u043d\u043e';setTimeout(function(){var e=document.getElementById('uid-txt');if(e)e.textContent=userId;},1500);}
    } else {
      pdrOpen();
    }
  },true);
}



/* Bell notification fix */
var bellCaptureAdded=false;
function fixBell(){
  if(bellCaptureAdded)return;

  /* Popup в body — стабільно */
  if(!document.getElementById('bell-popup')){
    var popup=document.createElement('div');
    popup.id='bell-popup';
    popup.style.cssText='display:none;position:fixed;right:16px;top:56px;background:#1a2c38;border:1px solid #2d4a5a;border-radius:14px;padding:16px;min-width:260px;z-index:10002;box-shadow:0 8px 32px rgba(0,0,0,.5)';
    popup.innerHTML='<div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:12px">\u0421\u043f\u043e\u0432\u0456\u0449\u0435\u043d\u043d\u044f</div><div style="font-size:12px;color:#8a9bb0;text-align:center;padding:12px 0">\u041f\u043e\u043a\u0438 \u043d\u0435\u043c\u0430\u0454 \u0441\u043f\u043e\u0432\u0456\u0449\u0435\u043d\u044c</div>';
    document.body.appendChild(popup);
  }

  bellCaptureAdded=true;

  document.addEventListener('click',function(ev){
    var popup=document.getElementById('bell-popup');
    if(!popup)return;
    /* Знаходимо bell button по SVG path */
    var bellPath=document.querySelector('header button path[d*="M18 8A6"]');
    var bellBtn=bellPath?bellPath.closest('button'):null;
    if(bellBtn&&bellBtn.contains(ev.target)){
      ev.stopImmediatePropagation();
      ev.preventDefault();
      popup.style.display=popup.style.display==='none'?'block':'none';
      /* Позиціонуємо відносно bell кнопки */
      var r=bellBtn.getBoundingClientRect();
      popup.style.top=(r.bottom+8)+'px';
      popup.style.right=(window.innerWidth-r.right)+'px';
    } else if(!popup.contains(ev.target)){
      popup.style.display='none';
    }
  },true);
}


/* Profile button fix — відкривати drawer замість React auth */
function fixProfileBtn(){
  var header=document.querySelector('header');
  if(!header)return;
  var btns=header.querySelectorAll('button');
  var profileBtn=null;
  for(var i=0;i<btns.length;i++){
    if(btns[i].querySelector('img')){profileBtn=btns[i];break;}
  }
  if(!profileBtn||profileBtn.dataset.pf==='1')return;
  var newBtn=profileBtn.cloneNode(true);
  newBtn.dataset.pf='1';
  newBtn.onclick=function(ev){ev.stopPropagation();pdrOpen();};
  profileBtn.parentNode.replaceChild(newBtn,profileBtn);
}

/* SIDEBAR RUN */
function run(){
  addCapture();
  /* Якщо наш блок вже є — не патчимо */
  if(!document.querySelector('[data-ub="1"]')){
    var all=document.querySelectorAll('*');
    for(var i=0;i<all.length;i++){
      var el=all[i];
      if(el.childNodes.length===1&&el.childNodes[0].nodeType===3&&el.childNodes[0].textContent==='\u0423\u0432\u0456\u0439\u0442\u0438'){
        var wrap=el.parentElement;
        if(!wrap)continue;

        /* Створюємо НОВИЙ div — без React onClick */
        var newEl=document.createElement('div');
        newEl.setAttribute('data-ub','1');
        newEl.style.cssText=(wrap.getAttribute('style')||'')+';display:flex;align-items:center;';
        newEl.innerHTML=
          '<div style="flex:1;min-width:0">'+
            '<div style="font-size:14px;font-weight:700;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">\u0412\u0456\u043a\u0430</div>'+
            '<div id="uid-el" style="font-size:11px;color:#8a9bb0;font-weight:600;margin-top:2px;display:flex;align-items:center;gap:5px;cursor:pointer;user-select:none">'+
              '<span id="uid-txt">'+userId+'</span>'+
              '<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="#8a9bb0" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="#8a9bb0" stroke-width="2" stroke-linecap="round"/></svg>'+
            '</div>'+
          '</div>'+
          '<div id="pdr-arrow" onclick="pdrOpen()" style="padding:10px;cursor:pointer;display:flex;align-items:center">'+
            '<svg width="7" height="12" viewBox="0 0 7 12" fill="none"><path d="M1 1l5 5-5 5" stroke="#557086" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
          '</div>';

        /* Замінюємо wrap новим елементом */
        var parent=wrap.parentElement;
        if(!parent)continue;

        /* Клонуємо parent щоб прибрати React onClick handlers */
        if(!parent.dataset.ubclean){
          var cleanParent=parent.cloneNode(false);
          cleanParent.setAttribute('data-ubclean','1');
          while(parent.firstChild)cleanParent.appendChild(parent.firstChild);
          if(parent.parentElement)parent.parentElement.replaceChild(cleanParent,parent);
          parent=cleanParent;
          /* Наш onclick на cleanParent */
          parent.style.cursor='pointer';
          parent.onclick=function(ev){
            if(ev.target.closest('#uid-el')||ev.target.closest('#pdr-arrow'))return;
            if(document.getElementById('pdr-bg'))return; /* drawer вже відкритий */
            pdrOpen();
          };
        }

        parent.replaceChild(newEl,wrap);

        /* Копіювання ID */
        var uid=document.getElementById('uid-el');
        if(uid){uid.onclick=function(ev){ev.stopPropagation();navigator.clipboard.writeText(userId);var t=document.getElementById('uid-txt');if(t){t.textContent='\u2705 \u0421\u043a\u043e\u043f\u0456\u0439\u043e\u0432\u0430\u043d\u043e';setTimeout(function(){var e=document.getElementById('uid-txt');if(e)e.textContent=userId;},1500);}};}

        /* VIP progress */
        if(!document.querySelector('.vip-prog')){
          var prog=document.createElement('div');prog.className='vip-prog';prog.setAttribute('data-ubsub','1');
          prog.style.cssText='margin:0 12px 14px;padding:10px 14px;border-radius:14px;background:rgba(205,127,50,0.08);border:1px solid rgba(205,127,50,0.2)';
          var bw=Math.max(pct,12);
          prog.innerHTML='<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:11px;color:#557086;font-weight:600">VIP \u0420\u0406\u0412\u0415\u041d\u042c</span><span style="font-size:11px;color:'+lvl.color+';font-weight:700">'+lvl.name+'</span></div><div style="height:6px;background:#0f212e;border-radius:4px;overflow:hidden"><div style="height:100%;width:'+bw+'%;background:linear-gradient(90deg,'+lvl.color+','+lvl.color+'99);border-radius:4px;box-shadow:0 0 8px '+lvl.color+'55"></div></div><div style="display:flex;justify-content:space-between;margin-top:5px"><span style="font-size:10px;color:#557086">$'+wagered+'</span><span style="font-size:10px;color:#557086">$'+lvl.next+'</span></div>';
          newEl.parentNode.insertBefore(prog,newEl.nextSibling);
        }
        break;
      }
    }
  }
  /* Logo fix */
  var logo=document.querySelector('header div[style*="flex:1"]');
  if(logo&&!logo.dataset.lf){logo.dataset.lf='1';logo.style.cssText='position:absolute;left:50%;transform:translateX(-50%);pointer-events:none;';}
}
setInterval(function(){run();fixBell();fixProfileBtn();},300);

})();
